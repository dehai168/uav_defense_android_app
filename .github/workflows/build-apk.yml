name: Build APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  ANDROID_API_LEVEL: "34"
  ANDROID_BUILD_TOOLS: "34.0.0"

jobs:
  build-apks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platforms;android-${ANDROID_API_LEVEL}" "build-tools;${ANDROID_BUILD_TOOLS}"

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Build debug and release APKs
        run: ./gradlew :app:assembleDebug :app:assembleRelease

      - name: Rename APKs with build variant suffix
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/uav-defense-debug.apk
          mv app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/uav-defense-release-unsigned.apk

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/uav-defense-debug.apk
          if-no-files-found: error

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/uav-defense-release-unsigned.apk
          if-no-files-found: error

      - name: Generate release tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: release_tag
        run: echo "tag=apk-${{ github.run_number }}-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release with APKs
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: APK Build ${{ github.run_number }}
          files: |
            app/build/outputs/apk/debug/uav-defense-debug.apk
            app/build/outputs/apk/release/uav-defense-release-unsigned.apk
          generate_release_notes: true
