name: Build APK

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'build.gradle*'
      - 'settings.gradle*'
      - 'gradle/**'
      - 'gradle.properties'
      - '.github/workflows/build-apk.yml'
      - 'app/signing/**'
  workflow_dispatch:

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  ANDROID_API_LEVEL: "34"
  ANDROID_BUILD_TOOLS: "34.0.0"

jobs:
  build-apks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platforms;android-${ANDROID_API_LEVEL}" "build-tools;${ANDROID_BUILD_TOOLS}"

      - name: Grant execute permission for scripts and Gradle wrapper
        run: |
          chmod +x gradlew

      - name: Verify fixed release keystore exists
        run: |
          if [ ! -f "app/signing/release.jks" ]; then
            echo "::error::Missing fixed release keystore: app/signing/release.jks"
            echo "Add your stable JKS file at app/signing/release.jks and keep it unchanged between builds."
            exit 1
          fi

      - name: Build debug and release APKs
        run: ./gradlew :app:assembleDebug :app:assembleRelease

      - name: Prepare APK assets
        id: prepare_apks
        run: |
          set -euo pipefail

          DEBUG_APK="$(find app/build/outputs/apk/debug -maxdepth 1 -name '*.apk' | sort | head -n 1)"
          if [ -z "${DEBUG_APK}" ]; then
            echo "Debug APK not found."
            exit 1
          fi

          RELEASE_APKS="$(find app/build/outputs/apk/release -maxdepth 1 -name '*.apk' | sort)"
          echo "Discovered release APK candidates:"
          echo "${RELEASE_APKS}"

          RELEASE_APK="$(echo "${RELEASE_APKS}" | head -n 1)"
          RELEASE_SIGNED="false"
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          APKSIGNER=""
          if [ -n "${SDK_ROOT}" ] && [ -x "${SDK_ROOT}/build-tools/${ANDROID_BUILD_TOOLS}/apksigner" ]; then
            APKSIGNER="${SDK_ROOT}/build-tools/${ANDROID_BUILD_TOOLS}/apksigner"
          else
            APKSIGNER="$(command -v apksigner || true)"
          fi

          if [ -n "${APKSIGNER}" ] && [ -x "${APKSIGNER}" ]; then
            while IFS= read -r candidate; do
              if [ -n "${candidate}" ] && "${APKSIGNER}" verify "${candidate}" >/dev/null 2>&1; then
                RELEASE_APK="${candidate}"
                RELEASE_SIGNED="true"
                break
              fi
            done <<< "${RELEASE_APKS}"
          else
            echo "apksigner not available in prepare step; release APK signing detection falls back to filename/path ordering."
          fi

          if [ -z "${RELEASE_APK}" ]; then
            echo "Release APK not found."
            exit 1
          fi

          if [ "${RELEASE_SIGNED}" = "true" ]; then
            echo "Using signed release APK artifact: ${RELEASE_APK}"
          else
            echo "No signed release APK found; using available release artifact: ${RELEASE_APK}"
          fi

          ASSET_DIR="app/build/outputs/apk/ci-assets"
          mkdir -p "${ASSET_DIR}"

          DEBUG_ASSET="${ASSET_DIR}/uav-defense-debug.apk"
          RELEASE_ASSET="${ASSET_DIR}/uav-defense-release.apk"
          if [ "${RELEASE_SIGNED}" != "true" ]; then
            RELEASE_ASSET="${ASSET_DIR}/uav-defense-release-unsigned.apk"
          fi

          cp "${DEBUG_APK}" "${DEBUG_ASSET}"
          cp "${RELEASE_APK}" "${RELEASE_ASSET}"

          echo "debug_apk=${DEBUG_ASSET}" >> "$GITHUB_OUTPUT"
          echo "release_apk=${RELEASE_ASSET}" >> "$GITHUB_OUTPUT"

      - name: Report APK signing SHA1
        run: |
          set -euo pipefail

          DEBUG_APK="${{ steps.prepare_apks.outputs.debug_apk }}"
          RELEASE_APK="${{ steps.prepare_apks.outputs.release_apk }}"
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          APKSIGNER=""
          if [ -n "${SDK_ROOT}" ] && [ -x "${SDK_ROOT}/build-tools/${ANDROID_BUILD_TOOLS}/apksigner" ]; then
            APKSIGNER="${SDK_ROOT}/build-tools/${ANDROID_BUILD_TOOLS}/apksigner"
          else
            APKSIGNER="$(command -v apksigner || true)"
          fi

          print_sha1() {
            local label="$1"
            local apk="$2"
            local sha1=""

            echo "::group::${label} APK SHA1" >&2
            echo "${label} APK path: ${apk}" >&2

            if [ -n "${APKSIGNER}" ] && [ -x "${APKSIGNER}" ]; then
              local verify_output
              local verify_status=0
              verify_output="$("${APKSIGNER}" verify --print-certs "${apk}" 2>&1)" || verify_status=$?

              if [ "${verify_status}" -eq 0 ]; then
                sha1="$(echo "${verify_output}" | awk -F': ' '/certificate SHA-1 digest:/ {print $NF; exit}')"
                if echo "${sha1}" | grep -Eq '^([A-Fa-f0-9]{2}:){19}[A-Fa-f0-9]{2}$'; then
                  echo "${label} certificate SHA1: ${sha1}" >&2
                  echo "::notice title=${label} SHA1::${sha1}" >&2
                else
                  echo "${verify_output}" >&2
                  sha1="UNKNOWN"
                  echo "::warning title=${label} SHA1::Could not parse SHA1 from apksigner output" >&2
                fi
              else
                echo "${verify_output}" >&2
                sha1="UNSIGNED"
                echo "::warning title=${label} SHA1::UNSIGNED (no APK signing certificate found)" >&2
              fi
            else
              echo "apksigner not found in runner environment." >&2
              sha1="UNKNOWN"
              echo "::warning title=${label} SHA1::UNKNOWN (apksigner not available)" >&2
            fi

            echo "${label} SHA1 final result: ${sha1}" >&2
            echo "::endgroup::" >&2
            echo "${sha1}"
          }

          DEBUG_SHA1="$(print_sha1 "Debug" "${DEBUG_APK}")"
          RELEASE_SHA1="$(print_sha1 "Release" "${RELEASE_APK}")"

          {
            echo "### APK signature SHA1"
            echo "- Debug APK: \`${DEBUG_APK}\`"
            echo "- Release APK: \`${RELEASE_APK}\`"
            echo "- Debug SHA1: \`${DEBUG_SHA1}\`"
            echo "- Release SHA1: \`${RELEASE_SHA1}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-apks
          path: |
            ${{ steps.prepare_apks.outputs.debug_apk }}
            ${{ steps.prepare_apks.outputs.release_apk }}
          if-no-files-found: error

      - name: Generate release tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: release_tag
        run: echo "tag=apk-${{ github.run_number }}-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release with APKs
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: APK Build ${{ github.run_number }}
          files: |
            ${{ steps.prepare_apks.outputs.debug_apk }}
            ${{ steps.prepare_apks.outputs.release_apk }}
          generate_release_notes: true
