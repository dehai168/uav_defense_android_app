name: Build APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  ANDROID_API_LEVEL: "34"
  ANDROID_BUILD_TOOLS: "34.0.0"

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platforms;android-${ANDROID_API_LEVEL}" "build-tools;${ANDROID_BUILD_TOOLS}"

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Build debug and release APKs
        run: ./gradlew :app:assembleDebug :app:assembleRelease

      - name: Prepare APK assets
        id: prepare_apks
        run: |
          set -euo pipefail

          DEBUG_APK="$(find app/build/outputs/apk/debug -maxdepth 1 -name '*.apk' | head -n 1)"
          if [ -z "${DEBUG_APK}" ]; then
            echo "Debug APK not found."
            exit 1
          fi

          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            RELEASE_APK="app/build/outputs/apk/release/app-release.apk"
          elif [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            RELEASE_APK="app/build/outputs/apk/release/app-release-unsigned.apk"
          else
            RELEASE_APK="$(find app/build/outputs/apk/release -maxdepth 1 -name '*.apk' | head -n 1)"
          fi

          if [ -z "${RELEASE_APK}" ]; then
            echo "Release APK not found."
            exit 1
          fi

          ASSET_DIR="app/build/outputs/apk/ci-assets"
          mkdir -p "${ASSET_DIR}"

          DEBUG_ASSET="${ASSET_DIR}/uav-defense-debug.apk"
          RELEASE_ASSET="${ASSET_DIR}/uav-defense-release.apk"
          if [[ "$(basename "${RELEASE_APK}")" == *unsigned* ]]; then
            RELEASE_ASSET="${ASSET_DIR}/uav-defense-release-unsigned.apk"
          fi

          cp "${DEBUG_APK}" "${DEBUG_ASSET}"
          cp "${RELEASE_APK}" "${RELEASE_ASSET}"

          echo "debug_apk=${DEBUG_ASSET}" >> "$GITHUB_OUTPUT"
          echo "release_apk=${RELEASE_ASSET}" >> "$GITHUB_OUTPUT"

      - name: Report APK signing SHA1
        run: |
          set -euo pipefail

          DEBUG_APK="${{ steps.prepare_apks.outputs.debug_apk }}"
          RELEASE_APK="${{ steps.prepare_apks.outputs.release_apk }}"
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          APKSIGNER=""
          if [ -n "${SDK_ROOT}" ] && [ -x "${SDK_ROOT}/build-tools/${ANDROID_BUILD_TOOLS}/apksigner" ]; then
            APKSIGNER="${SDK_ROOT}/build-tools/${ANDROID_BUILD_TOOLS}/apksigner"
          else
            APKSIGNER="$(command -v apksigner || true)"
          fi

          print_sha1() {
            local label="$1"
            local apk="$2"
            local output_var="$3"
            local sha1=""

            echo "::group::${label} APK SHA1"
            echo "${label} APK path: ${apk}"

            if [ -x "${APKSIGNER}" ]; then
              set +e
              local verify_output
              verify_output="$("${APKSIGNER}" verify --print-certs "${apk}" 2>&1)"
              local verify_status=$?
              set -e

              if [ "${verify_status}" -eq 0 ]; then
                sha1="$(echo "${verify_output}" | sed -n 's/.*certificate SHA-1 digest: \(.*\)$/\1/p' | head -n 1)"
                if [ -n "${sha1}" ]; then
                  echo "${label} certificate SHA1: ${sha1}"
                  echo "::notice title=${label} SHA1::${sha1}"
                else
                  echo "${verify_output}"
                  sha1="UNKNOWN"
                  echo "::warning title=${label} SHA1::Could not parse SHA1 from apksigner output"
                fi
              else
                echo "${verify_output}"
                sha1="UNSIGNED"
                echo "::warning title=${label} SHA1::UNSIGNED (no APK signing certificate found)"
              fi
            else
              echo "apksigner not found in runner environment."
              sha1="UNKNOWN"
              echo "::warning title=${label} SHA1::UNKNOWN (apksigner not available)"
            fi

            echo "${label} SHA1 final result: ${sha1}"
            printf -v "${output_var}" '%s' "${sha1}"
            echo "::endgroup::"
          }

          DEBUG_SHA1=""
          RELEASE_SHA1=""
          print_sha1 "Debug" "${DEBUG_APK}" DEBUG_SHA1
          print_sha1 "Release" "${RELEASE_APK}" RELEASE_SHA1

          {
            echo "### APK signature SHA1"
            echo "- Debug APK: \`${DEBUG_APK}\`"
            echo "- Release APK: \`${RELEASE_APK}\`"
            echo "- Debug SHA1: \`${DEBUG_SHA1}\`"
            echo "- Release SHA1: \`${RELEASE_SHA1}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-apks
          path: |
            ${{ steps.prepare_apks.outputs.debug_apk }}
            ${{ steps.prepare_apks.outputs.release_apk }}
          if-no-files-found: error

      - name: Generate release tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: release_tag
        run: echo "tag=apk-${{ github.run_number }}-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release with APK
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: APK Build ${{ github.run_number }}
          files: |
            ${{ steps.prepare_apks.outputs.debug_apk }}
            ${{ steps.prepare_apks.outputs.release_apk }}
          generate_release_notes: true
